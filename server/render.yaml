services:
  - type: web
    name: breedai-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: ML_SERVICE_URL
        sync: false

  - type: web
    name: bovisionai-ml
    runtime: python
    plan: free
    rootDir: server/ml-service
    buildCommand: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: gunicorn predict_service:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "2"
